version: '3.8'
services:
  backend:
    build: .
    ports:
      - "3003:3003"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - .:/app
    command: npm start
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
